<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="200" rx="16" fill="url(#bg)"/>
  <rect x="0" y="186" width="600" height="14" rx="0" fill="url(#accent)" opacity="0.8"/>

  <!-- Microphone icon -->
  <g transform="translate(80, 55)">
    <rect x="20" y="0" width="24" height="50" rx="12" fill="none" stroke="#e94560" stroke-width="3"/>
    <path d="M 10 35 Q 10 65 32 65 Q 54 65 54 35" fill="none" stroke="#e94560" stroke-width="3"/>
    <line x1="32" y1="65" x2="32" y2="80" stroke="#e94560" stroke-width="3"/>
    <line x1="20" y1="80" x2="44" y2="80" stroke="#e94560" stroke-width="3"/>
  </g>

  <!-- Sound waves -->
  <g transform="translate(150, 60)" opacity="0.6">
    <path d="M 0 20 Q 5 0 10 20 Q 15 40 20 20 Q 25 0 30 20" fill="none" stroke="#4ecca3" stroke-width="2.5"/>
    <path d="M 35 20 Q 40 5 45 20 Q 50 35 55 20 Q 60 5 65 20" fill="none" stroke="#4ecca3" stroke-width="2.5"/>
    <path d="M 70 20 Q 75 10 80 20 Q 85 30 90 20" fill="none" stroke="#4ecca3" stroke-width="2.5" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="300" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="-0.5">cc-universal-voice</text>

  <!-- Subtitle -->
  <text x="300" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#a0a0b0">Streaming STT for Claude Code /voice</text>

  <!-- Language chips -->
  <g transform="translate(140, 150)">
    <rect x="0" y="0" width="38" height="22" rx="11" fill="#e94560" opacity="0.3"/>
    <text x="19" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#e94560" font-weight="600">HE</text>

    <rect x="46" y="0" width="34" height="22" rx="11" fill="#4ecca3" opacity="0.2"/>
    <text x="63" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4ecca3">EN</text>

    <rect x="88" y="0" width="34" height="22" rx="11" fill="#4ecca3" opacity="0.2"/>
    <text x="105" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4ecca3">ES</text>

    <rect x="130" y="0" width="34" height="22" rx="11" fill="#4ecca3" opacity="0.2"/>
    <text x="147" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4ecca3">FR</text>

    <rect x="172" y="0" width="34" height="22" rx="11" fill="#4ecca3" opacity="0.2"/>
    <text x="189" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4ecca3">JA</text>

    <rect x="214" y="0" width="34" height="22" rx="11" fill="#4ecca3" opacity="0.2"/>
    <text x="231" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4ecca3">AR</text>

    <rect x="256" y="0" width="52" height="22" rx="11" fill="#ffffff" opacity="0.1"/>
    <text x="282" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a0a0b0">60+</text>
  </g>
</svg>
